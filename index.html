<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chef Pro Ultra</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #000;
            --card: #1c1c1e;
            --accent: #ff9f0a;
            --txt: #fff;
            --gray: #8e8e93;
            --input: #2c2c2e;
            --success: #34c759;
            --error: #ff453a;
        }

        body {
            background: var(--bg);
            color: var(--txt);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding-bottom: 90px;
        }

        .header {
            padding: 20px;
            background: var(--card);
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
            text-align: center;
        }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        /* Navegación Inferior */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(28, 28, 30, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            backdrop-filter: blur(15px);
            border-top: 1px solid #333;
        }

        .nav-item {
            color: var(--gray);
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-item.active { color: var(--accent); transform: scale(1.1); }

        /* UI Elements */
        input, select {
            width: 100%;
            background: var(--input);
            border: none;
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            margin-bottom: 12px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn {
            border: none;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.96); }
        .btn-accent { background: var(--accent); color: #000; }
        .btn-gray { background: #444; color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }

        .card {
            background: var(--card);
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 12px;
        }

        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .hidden { display: none; }

        /* Badge para los ingredientes del borrador */
        .ing-badge {
            background: #2c2c2e;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;
            border-left: 3px solid var(--accent);
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="header">
    <h1 id="view-title" style="margin:0; font-size: 22px;">Calculadora</h1>
</div>

<div id="view-calc" class="container">
    <div class="card">
        <p style="color: var(--gray); margin-top:0;">1. Elige una receta:</p>
        <select id="calc-select-receta" onchange="actualizarInfoReceta()">
            <option value="">Cargando recetas...</option>
        </select>
        
        <div style="display: flex; gap: 10px;">
            <div style="flex:1">
                <label style="font-size:12px; color:var(--gray)">Rinde Original</label>
                <input type="number" id="calc-r-ori" readonly style="opacity: 0.6">
            </div>
            <div style="flex:1">
                <label style="font-size:12px; color:var(--accent)">Quiero Producir</label>
                <input type="number" id="calc-r-des" placeholder="Ej: 50">
            </div>
        </div>
        <button class="btn btn-accent" onclick="calcularSimulacion()">Calcular Costo Final</button>
    </div>

    <div id="res-box" class="hidden">
        <h3>Resultado Escalado</h3>
        <div id="res-lista"></div>
        <div class="card" style="background: var(--accent); color: #000;">
            <b id="res-total" style="font-size: 20px;">TOTAL: $0.00</b>
        </div>
        <button class="btn" style="background: #25D366; color: white;" onclick="compartirWS()">
            📲 Enviar por WhatsApp
        </button>
    </div>
</div>

<div id="view-recetas" class="container hidden">
    <div class="card">
        <h3>Nueva Receta</h3>
        <input type="text" id="rec-nom" placeholder="Nombre (ej: Lemon Pie)">
        <input type="number" id="rec-rin" placeholder="¿Cuánto rinde la base?">
        
        <div style="background: #000; padding: 12px; border-radius: 12px; margin-bottom: 10px;">
            <p style="margin:0 0 10px 0; font-size: 13px; color: var(--accent);">Añadir ingrediente:</p>
            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 5px; margin-bottom: 10px;">
                <input type="text" id="t-nom" placeholder="Nombre" style="margin:0">
                <input type="number" id="t-can" placeholder="Cant." style="margin:0">
                <input type="text" id="t-uni" placeholder="Unid." style="margin:0">
            </div>
            <button class="btn btn-gray" style="padding: 10px;" onclick="agregarIngredienteABorrador()">+ Agregar Fila</button>
        </div>

        <div id="borrador-lista" style="margin: 15px 0;"></div>
        
        <button class="btn btn-accent" onclick="guardarRecetaMaestra()">💾 Guardar Receta Maestra</button>
    </div>

    <h3 style="color:var(--gray)">Recetas Guardadas</h3>
    <div id="lista-recetas-final"></div>
</div>

<div id="view-precios" class="container hidden">
    <div class="card">
        <h3>Cargar Precio</h3>
        <input type="text" id="ins-nom" placeholder="Insumo (ej: Harina)">
        <div style="display: flex; gap: 10px;">
            <input type="number" id="ins-pre" placeholder="Precio $">
            <input type="number" id="ins-can" placeholder="Cant. (g/ml)">
        </div>
        <button class="btn btn-accent" onclick="guardarPrecio()">Actualizar Inventario</button>
    </div>

    <div id="lista-precios-final"></div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="nav('calc', 'Calculadora')"><span>⚖️</span>Calc</div>
    <div class="nav-item" onclick="nav('recetas', 'Mis Recetas')"><span>📖</span>Recetas</div>
    <div class="nav-item" onclick="nav('precios', 'Precios')"><span>💰</span>Precios</div>
</div>

<script>
    // ESTADO DE LA APP
    let db = {
        precios: JSON.parse(localStorage.getItem('cp_precios')) || {},
        recetas: JSON.parse(localStorage.getItem('cp_recetas')) || []
    };
    let borradorIngredientes = [];
    let textoWhatsApp = "";

    function nav(view, title) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById('view-' + view).classList.remove('hidden');
        document.getElementById('view-title').innerText = title;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');

        if(view === 'calc') popularSelect();
        if(view === 'recetas') renderRecetas();
        if(view === 'precios') renderPrecios();
    }

    // --- LÓGICA PRECIOS ---
    function guardarPrecio() {
        const n = document.getElementById('ins-nom').value.toLowerCase().trim();
        const p = parseFloat(document.getElementById('ins-pre').value);
        const c = parseFloat(document.getElementById('ins-can').value);
        if(n && p && c) {
            db.precios[n] = p / c;
            localStorage.setItem('cp_precios', JSON.stringify(db.precios));
            renderPrecios();
            document.getElementById('ins-nom').value = "";
            document.getElementById('ins-pre').value = "";
            document.getElementById('ins-can').value = "";
        }
    }

    function renderPrecios() {
        const d = document.getElementById('lista-precios-final');
        d.innerHTML = "";
        for (let x in db.precios) {
            d.innerHTML += `<div class="card flex-between"><span>${x}</span><b>$${db.precios[x].toFixed(3)} /unid</b></div>`;
        }
    }

    // --- LÓGICA RECETAS (FILAS DINÁMICAS) ---
    function agregarIngredienteABorrador() {
        const n = document.getElementById('t-nom').value.toLowerCase().trim();
        const c = document.getElementById('t-can').value;
        const u = document.getElementById('t-uni').value;
        if(n && c && u) {
            borradorIngredientes.push({ n, c, u });
            renderBorrador();
            document.getElementById('t-nom').value = "";
            document.getElementById('t-can').value = "";
            document.getElementById('t-uni').value = "";
            document.getElementById('t-nom').focus();
        }
    }

    function renderBorrador() {
        const d = document.getElementById('borrador-lista');
        d.innerHTML = "";
        borradorIngredientes.forEach((ing, i) => {
            d.innerHTML += `<div class="ing-badge"><span>${ing.c}${ing.u} ${ing.n}</span><span onclick="eliminarDelBorrador(${i})" style="color:var(--error)">✕</span></div>`;
        });
    }

    function eliminarDelBorrador(i) {
        borradorIngredientes.splice(i, 1);
        renderBorrador();
    }

    function guardarRecetaMaestra() {
        const nom = document.getElementById('rec-nom').value;
        const rin = document.getElementById('rec-rin').value;
        if(nom && rin && borradorIngredientes.length > 0) {
            const cuerpo = borradorIngredientes.map(i => `${i.n},${i.c},${i.u}`).join('\n');
            db.recetas.push({ nom, rin, cuerpo });
            localStorage.setItem('cp_recetas', JSON.stringify(db.recetas));
            borradorIngredientes = [];
            document.getElementById('rec-nom').value = "";
            document.getElementById('rec-rin').value = "";
            renderBorrador();
            renderRecetas();
            alert("Receta guardada!");
        }
    }

    function renderRecetas() {
        const d = document.getElementById('lista-recetas-final');
        d.innerHTML = "";
        db.recetas.forEach((r, i) => {
            d.innerHTML += `<div class="card flex-between"><span>${r.nom} (Rinde ${r.rin})</span><span onclick="borrarReceta(${i})" style="color:var(--error)">🗑️</span></div>`;
        });
    }

    function borrarReceta(i) {
        if(confirm("¿Borrar receta?")) {
            db.recetas.splice(i, 1);
            localStorage.setItem('cp_recetas', JSON.stringify(db.recetas));
            renderRecetas();
        }
    }

    // --- CALCULADORA ---
    function popularSelect() {
        const s = document.getElementById('calc-select-receta');
        s.innerHTML = '<option value="">Selecciona...</option>';
        db.recetas.forEach((r, i) => s.innerHTML += `<option value="${i}">${r.nom}</option>`);
    }

    function actualizarInfoReceta() {
        const idx = document.getElementById('calc-select-receta').value;
        if(idx !== "") {
            document.getElementById('calc-r-ori').value = db.recetas[idx].rin;
        }
    }

    function calcularSimulacion() {
        const idx = document.getElementById('calc-select-receta').value;
        const rDes = parseFloat(document.getElementById('calc-r-des').value);
        if(idx === "" || !rDes) return;

        const r = db.recetas[idx];
        const factor = rDes / r.rin;
        let total = 0;
        let html = "";
        textoWhatsApp = `*RECETA: ${r.nom}* (Rinde ${rDes})%0A%0A`;

        r.cuerpo.split('\n').forEach(linea => {
            const p = linea.split(',');
            const nom = p[0];
            const cant = parseFloat(p[1]) * factor;
            const uni = p[2];
            const costo = (db.precios[nom] || 0) * cant;
            total += costo;

            html += `<div class="card flex-between" style="font-size:14px"><span>${cant.toFixed(1)}${uni} ${nom}</span><b>$${costo.toFixed(2)}</b></div>`;
            textoWhatsApp += `• ${cant.toFixed(1)}${uni} ${nom}: $${costo.toFixed(2)}%0A`;
        });

        textoWhatsApp += `%0A*COSTO TOTAL: $${total.toFixed(2)}*`;
        document.getElementById('res-lista').innerHTML = html;
        document.getElementById('res-total').innerText = `TOTAL: $${total.toFixed(2)}`;
        document.getElementById('res-box').classList.remove('hidden');
    }

    function compartirWS() {
        window.open(`https://wa.me/?text=${textoWhatsApp}`, '_blank');
    }

    // Inicialización
    popularSelect();
</script>
</body>
</html>
